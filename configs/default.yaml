# PromptFuse default configuration

compressor:
  proxy_model: "openai-community/gpt2"
  compression_ratio: 0.40  # target token reduction (0.25, 0.40, 0.55)
  device: "auto"
  max_length: 1024  # GPT-2 context window; raise when using Llama-3.2-1B
  batch_size: 8  # lower (e.g. 4) on MPS if perplexity batches OOM
  preserve_patterns:  # keep critical instructions even at higher compression ratios
    - "\\bmust\\b"
    - "\\bexactly\\b"
    - "\\bonly\\b"
    - "\\bdo not\\b"
    - "\\bdon't\\b"
    - "\\breturn\\b"
    - "\\bformat\\b"
    - "\\bjson\\b"
    - "\\bxml\\b"
    - "\\bstep by step\\b"

unifier:
  encoder_model: "sentence-transformers/all-MiniLM-L6-v2"
  fine_tuned_encoder: null  # path to fine-tuned checkpoint, if available
  similarity_threshold: 0.80  # cosine similarity τ (0.85 after bi-encoder fine-tune)
  inventory_path: "data/canonical_inventory"
  embedding_dim: 384
  faiss_nprobe: 16

serving:
  host: "0.0.0.0"
  port: 8080
  vllm_base_url: "http://localhost:8000"
  vllm_metrics_url: null  # optional metrics endpoint (e.g., Prometheus scrape URL)
  vllm_timeout_s: 300.0
  vllm_model: "meta-llama/Llama-3.1-8B-Instruct"
  enable_compression: true
  enable_unification: true
  log_path: "logs/promptfuse.jsonl"

evaluation:
  target_llm: "meta-llama/Llama-3.1-8B-Instruct"
  compression_ratios: [0.25, 0.40, 0.55]
  rouge_l_threshold: 0.85
  latency_p99_ms: 50
  cache_hit_multiplier: 2.0
  speedup_target: 1.5
